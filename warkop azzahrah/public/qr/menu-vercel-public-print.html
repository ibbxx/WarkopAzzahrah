<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Menu Publik Warkop Azzahra</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f1ea;
        color: #171717;
      }

      .sheet {
        width: 100%;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 420px);
        background: #ffffff;
        border: 2px solid #171717;
        border-radius: 24px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .qr {
        margin: 24px auto;
        width: min(100%, 320px);
        aspect-ratio: 1;
        display: block;
      }

      .link {
        margin-top: 12px;
        font-size: 12px;
        color: #525252;
        word-break: break-all;
      }

      @media print {
        body {
          background: #ffffff;
        }

        .sheet {
          min-height: auto;
          padding: 0;
        }

        .card {
          width: 100%;
          max-width: none;
          border-radius: 0;
          box-shadow: none;
          border: none;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <section class="card">
        <h1>Scan Menu</h1>
        <p>Warkop Azzahra</p>
        <img
          class="qr"
          src="/qr/menu-vercel-public.svg"
          alt="QR code menuju halaman menu publik Warkop Azzahra"
        />
        <p>Scan QR ini untuk membuka menu digital.</p>
        <p class="link">https://warkop-azzahrah-m4xg.vercel.app/menu</p>
      </section>
    </main>
  </body>
</html>
